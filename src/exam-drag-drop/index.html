<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planification des examens écrits</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #f0f2f5;
      color: #212529;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      background: #1a56db;
      color: #fff;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .toolbar h1 { font-size: 13px; font-weight: 600; flex: 1; }
    .search-input {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      width: 220px;
      background: rgba(255,255,255,.18);
      color: #fff;
    }
    .search-input::placeholder { color: rgba(255,255,255,.65); }
    .search-input:focus { outline: 2px solid rgba(255,255,255,.5); background: rgba(255,255,255,.25); }

    /* ── Board ───────────────────────────────────────────────────────────── */
    .board {
      flex: 1;
      display: flex;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
    }

    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #6c757d;
    }
    .placeholder span  { font-weight: 500; font-size: 13px; }
    .placeholder small { font-size: 11px; color: #adb5bd; }

    /* ── Columns — 2 colonnes flexibles ──────────────────────────────────── */
    .column {
      flex: 1;
      background: #e9ecef;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      min-width: 200px;
      overflow: hidden;
    }
    .column-header {
      padding: 10px 12px 8px;
      border-radius: 6px 6px 0 0;
      background: #dee2e6;
    }
    .col-unaffected > .column-header { background: #cfe2ff; }
    .col-unaffected .col-title       { color: #084298; }

    .col-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .col-title {
      font-weight: 600;
      font-size: 13px;
      color: #343a40;
      flex: 1;
    }
    .col-meta {
      font-size: 11px;
      color: #6c757d;
      margin-top: 3px;
    }

    /* ── Places badge ────────────────────────────────────────────────────── */
    .badge-places {
      flex-shrink: 0;
      padding: 2px 8px;
      border-radius: 9px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-places.free    { background: #d1e7dd; color: #0f5132; }
    .badge-places.warn    { background: #fff3cd; color: #664d03; }
    .badge-places.full    { background: #f8d7da; color: #842029; }
    .badge-places.unknown { background: #e2e3e5; color: #41464b; }

    /* ── Card list ───────────────────────────────────────────────────────── */
    .card-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-list.drag-over {
      background: rgba(26,86,219,.07);
      border-radius: 4px;
      outline: 2px dashed #1a56db;
    }
    .column.drop-blocked .card-list.drag-over {
      background: rgba(220,53,69,.07);
      outline-color: #dc3545;
    }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .exam-card {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      padding: 8px 10px;
      cursor: grab;
      user-select: none;
      transition: box-shadow .1s, transform .1s;
    }
    .exam-card:hover    { box-shadow: 0 2px 6px rgba(0,0,0,.1); }
    .exam-card.dragging { opacity: .4; transform: scale(.97); }
    .exam-card.hidden   { display: none; }

    .card-entreprise {
      font-size: 10px;
      font-weight: 700;
      color: #1a56db;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 1px;
    }
    .card-nom   { font-weight: 600; font-size: 13px; color: #212529; }
    .card-titre { font-size: 11px; color: #495057; margin-top: 2px; }
    .card-date  { font-size: 10px; color: #6c757d; margin-top: 3px; }

    /* ── Empty states ────────────────────────────────────────────────────── */
    .empty-col {
      text-align: center;
      color: #adb5bd;
      font-size: 12px;
      padding: 20px 12px;
    }

    /* ── Status bar ──────────────────────────────────────────────────────── */
    .statusbar {
      padding: 5px 12px;
      font-size: 11px;
      background: #fff;
      border-top: 1px solid #dee2e6;
      min-height: 26px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .statusbar.success { background: #d1e7dd; color: #0f5132; }
    .statusbar.error   { background: #f8d7da; color: #842029; }
    .statusbar.warn    { background: #fff3cd; color: #664d03; }
  </style>
</head>
<body>

<div class="toolbar">
  <h1>Affectation — Examens écrits</h1>
  <input class="search-input" id="search" type="search"
    placeholder="Rechercher…" oninput="filterCards()" />
</div>
<div class="board" id="board">
  <div class="placeholder"><span>Chargement…</span></div>
</div>
<div class="statusbar" id="statusbar"></div>

<script>
  // Widget lié à Sessions_examens_ecrits.
  // grist.onRecord() reçoit la session sélectionnée.
  // Les examens sont chargés via fetchTable (lecture brute, non filtrée par Grist).

  let selectedSession = null;
  let allExams        = [];
  let draggingId      = null;

  // ── Grist ──────────────────────────────────────────────────────────────────

  grist.ready({ requiredAccess: 'full' });

  grist.onRecord(async record => {
    selectedSession = parseSession(record);
    await loadAllExams();
    render();
  });

  // ── Parsing session ────────────────────────────────────────────────────────

  function parseSession(r) {
    if (!r || !r.id || r.id < 0) return null;
    const rawPlaces = r.Places_disponibles;
    const places = typeof rawPlaces === 'number' ? rawPlaces
      : (rawPlaces != null && rawPlaces !== '' ? Number(rawPlaces) : null);
    return {
      id:     r.id,
      num:    String(r.num    ?? '').trim(),
      date:   r.Date          ?? null,   // timestamp Unix secondes
      centre: String(r.gristHelper_Display ?? ''),
      places: isNaN(places)   ? null : places,
      passee: !!r.Session_passee,
    };
  }

  // ── Chargement des examens (fetchTable, non filtré) ────────────────────────

  async function loadAllExams() {
    try {
      const tbl = await grist.docApi.fetchTable('Examens_ecrits');
      const n = tbl.id.length;
      allExams = [];
      for (let i = 0; i < n; i++) {
        const id = tbl.id[i];
        if (!id || id < 0) continue;

        // FK session : 0 = non affecté dans Grist
        const sessRaw  = tbl.Sessions_examens_ecrits?.[i] ?? 0;
        const sessionId = typeof sessRaw === 'number' && sessRaw > 0 ? sessRaw : null;

        // Date souhaitée
        const dateRaw = tbl.date_heure?.[i];
        let dateStr = '';
        if (typeof dateRaw === 'number' && dateRaw > 0) dateStr = fmtDate(dateRaw * 1000);
        else if (typeof dateRaw === 'string' && dateRaw) dateStr = dateRaw;

        // Nom candidat  : gristHelper_Display  = valeur affichée de la Ref Candidat
        // Dénomination  : gristHelper_Display5 = valeur affichée de la Ref Denomination (Entreprises)
        allExams.push({
          id,
          nom:        String(tbl.gristHelper_Display?.[i]  ?? ''),
          entreprise: String(tbl.gristHelper_Display5?.[i] ?? ''),
          titre:      String(tbl.libelle_examen_ecrit?.[i]      ?? ''),
          sessionId,
          date: dateStr,
        });
      }
    } catch (e) {
      console.warn('loadAllExams:', e.message);
      showStatus(`Impossible de charger Examens_ecrits : ${e.message}`, 'error');
    }
  }

  // Rafraîchit Places_disponibles de la session courante après un drop
  async function refreshSessionPlaces() {
    if (!selectedSession) return;
    try {
      const tbl = await grist.docApi.fetchTable('Sessions_examens_ecrits');
      const i   = tbl.id.findIndex(id => id === selectedSession.id);
      if (i < 0) return;
      const raw = tbl.Places_disponibles?.[i];
      const pl  = typeof raw === 'number' ? raw : (raw != null ? Number(raw) : null);
      if (!isNaN(pl)) selectedSession.places = pl;
    } catch {}
  }

  // ── Rendu ──────────────────────────────────────────────────────────────────

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    if (!selectedSession) {
      board.innerHTML = `
        <div class="placeholder">
          <span>Sélectionnez une session dans la liste</span>
          <small>Liez ce widget à la table Sessions_examens_ecrits</small>
        </div>`;
      const nonAff = allExams.filter(e => !e.sessionId).length;
      if (nonAff) showStatus(`${nonAff} examen(s) non affecté(s) — sélectionnez une session`);
      return;
    }

    board.appendChild(buildColumn(null));
    board.appendChild(buildColumn(selectedSession));

    filterCards();

    const nonAff = allExams.filter(e => !e.sessionId).length;
    const inSess = allExams.filter(e => e.sessionId === selectedSession.id).length;
    showStatus(`${nonAff} non affecté(s) · ${inSess} dans la session · ${allExams.length} total`);
  }

  function buildColumn(sess) {
    const isUnaffected = sess === null;
    const sessExams    = isUnaffected
      ? allExams.filter(e => !e.sessionId)
      : allExams.filter(e => e.sessionId === sess.id);

    const col = document.createElement('div');
    col.className = 'column' + (isUnaffected ? ' col-unaffected' : '');
    col.dataset.sessionId = isUnaffected ? '' : String(sess.id);
    if (sess && sess.places === 0) col.classList.add('drop-blocked');

    const header = document.createElement('div');
    header.className = 'column-header';
    if (isUnaffected) {
      header.innerHTML = `
        <div class="col-title-row">
          <span class="col-title">Non affectés</span>
          <span class="badge-places unknown">${sessExams.length}</span>
        </div>`;
    } else {
      const name    = sess.num || (sess.date ? fmtDate(sess.date * 1000) : `Session #${sess.id}`);
      const dateStr = sess.date ? fmtDate(sess.date * 1000) : '';
      header.innerHTML = `
        <div class="col-title-row">
          <span class="col-title">${esc(name)}</span>
          ${badgePlaces(sess.places)}
        </div>
        ${dateStr     ? `<div class="col-meta">${dateStr}</div>` : ''}
        ${sess.centre ? `<div class="col-meta">${esc(sess.centre)}</div>` : ''}`;
    }
    col.appendChild(header);

    const list = document.createElement('div');
    list.className = 'card-list';
    if (!sessExams.length) {
      list.innerHTML = `<div class="empty-col">${isUnaffected ? 'Aucun examen non affecté' : 'Déposez un examen ici'}</div>`;
    } else {
      sessExams.forEach(exam => list.appendChild(makeCard(exam)));
    }
    col.appendChild(list);

    list.addEventListener('dragover', e => {
      e.preventDefault();
      if (!col.classList.contains('drop-blocked')) list.classList.add('drag-over');
      e.dataTransfer.dropEffect = col.classList.contains('drop-blocked') ? 'none' : 'move';
    });
    list.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) list.classList.remove('drag-over');
    });
    list.addEventListener('drop', e => onDrop(e, col));

    return col;
  }

  function badgePlaces(places) {
    if (places === null || places === undefined) return '';
    const cls = places === 0 ? 'full' : places === 1 ? 'warn' : 'free';
    return `<span class="badge-places ${cls}">${places} pl.</span>`;
  }

  function makeCard(exam) {
    const card = document.createElement('div');
    card.className = 'exam-card';
    card.draggable = true;
    card.dataset.examId = String(exam.id);
    let html = '';
    if (exam.entreprise) html += `<div class="card-entreprise">${esc(exam.entreprise)}</div>`;
    html += `<div class="card-nom">${esc(exam.nom) || `Examen #${exam.id}`}</div>`;
    if (exam.titre) html += `<div class="card-titre">${esc(exam.titre)}</div>`;
    if (exam.date)  html += `<div class="card-date">📅 ${esc(exam.date)}</div>`;
    card.innerHTML = html;
    card.addEventListener('dragstart', e => {
      draggingId = exam.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      draggingId = null;
      document.querySelectorAll('.card-list').forEach(l => l.classList.remove('drag-over'));
    });
    return card;
  }

  // ── Drag & Drop ────────────────────────────────────────────────────────────

  async function onDrop(e, col) {
    e.preventDefault();
    col.querySelector('.card-list')?.classList.remove('drag-over');
    if (draggingId === null) return;
    if (col.classList.contains('drop-blocked')) {
      showStatus('Session complète — aucune place disponible.', 'error', 4000);
      return;
    }

    const targetSessId = col.dataset.sessionId ? Number(col.dataset.sessionId) : null;
    const exam = allExams.find(ex => ex.id === draggingId);
    if (!exam || exam.sessionId === targetSessId) return;

    if (targetSessId && selectedSession?.places === 1) {
      showStatus('Attention — dernière place disponible.', 'warn', 4000);
    }

    const prevSessionId = exam.sessionId;
    exam.sessionId = targetSessId;
    render();

    try {
      await grist.docApi.applyUserActions([[
        'UpdateRecord', 'Examens_ecrits', exam.id,
        { Sessions_examens_ecrits: targetSessId ?? 0 },
      ]]);
      const sessName = targetSessId
        ? (selectedSession?.num || `Session #${targetSessId}`)
        : 'Non affectés';
      showStatus(`Déplacé vers « ${esc(sessName)} ».`, 'success', 3000);
      await loadAllExams();
      await refreshSessionPlaces();
      render();
    } catch (err) {
      exam.sessionId = prevSessionId;
      render();
      showStatus(`Erreur : ${err.message}`, 'error');
    }
  }

  // ── Recherche ──────────────────────────────────────────────────────────────

  function filterCards() {
    const q = (document.getElementById('search')?.value ?? '').toLowerCase().trim();
    document.querySelectorAll('.exam-card').forEach(card => {
      card.classList.toggle('hidden', q.length > 0 && !card.textContent.toLowerCase().includes(q));
    });
  }

  // ── Helpers ────────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmtDate(ms) {
    const d = new Date(ms);
    if (isNaN(d.getTime())) return '';
    return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;
  }

  function showStatus(msg, type = '', duration = 0) {
    const bar = document.getElementById('statusbar');
    bar.textContent = msg;
    bar.className = `statusbar ${type}`;
    if (duration) setTimeout(() => { bar.textContent = ''; bar.className = 'statusbar'; }, duration);
  }
</script>
</body>
</html>
