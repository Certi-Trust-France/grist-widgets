<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planification des examens écrits</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #f0f2f5;
      color: #212529;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      background: #1a56db;
      color: #fff;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .toolbar h1 { font-size: 13px; font-weight: 600; flex: 1; }
    .search-input {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      width: 220px;
      background: rgba(255,255,255,.18);
      color: #fff;
    }
    .search-input::placeholder { color: rgba(255,255,255,.65); }
    .search-input:focus { outline: 2px solid rgba(255,255,255,.5); background: rgba(255,255,255,.25); }

    /* ── Board ───────────────────────────────────────────────────────────── */
    .board {
      flex: 1;
      display: flex;
      gap: 10px;
      padding: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      align-items: flex-start;
    }

    /* ── Columns ─────────────────────────────────────────────────────────── */
    .column {
      background: #e9ecef;
      border-radius: 6px;
      width: 200px;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      max-height: 100%;
    }
    .column-header {
      padding: 8px 10px 6px;
      border-radius: 6px 6px 0 0;
      background: #dee2e6;
      overflow: hidden;
    }
    .col-unaffected > .column-header { background: #cfe2ff; }
    .col-unaffected .col-title       { color: #084298; }
    .col-passee { opacity: .55; }

    .col-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .col-title {
      font-weight: 600;
      font-size: 12px;
      color: #343a40;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .col-meta, .col-lieu {
      font-size: 10px;
      color: #6c757d;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Places badge ────────────────────────────────────────────────────── */
    .badge-places {
      flex-shrink: 0;
      padding: 1px 6px;
      border-radius: 9px;
      font-size: 10px;
      font-weight: 700;
    }
    .badge-places.free    { background: #d1e7dd; color: #0f5132; }
    .badge-places.warn    { background: #fff3cd; color: #664d03; }
    .badge-places.full    { background: #f8d7da; color: #842029; }
    .badge-places.unknown { background: #e2e3e5; color: #41464b; }

    /* ── Card list ───────────────────────────────────────────────────────── */
    .card-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 60px;
    }
    .card-list.drag-over {
      background: rgba(26,86,219,.07);
      border-radius: 4px;
      outline: 2px dashed #1a56db;
    }
    .column.drop-blocked .card-list.drag-over {
      background: rgba(220,53,69,.07);
      outline-color: #dc3545;
    }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .exam-card {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      padding: 6px 8px;
      cursor: grab;
      user-select: none;
      transition: box-shadow .1s, transform .1s;
    }
    .exam-card:hover    { box-shadow: 0 2px 6px rgba(0,0,0,.1); }
    .exam-card.dragging { opacity: .4; transform: scale(.97); }
    .exam-card.hidden   { display: none; }

    .card-entreprise {
      font-size: 9px;
      font-weight: 700;
      color: #1a56db;
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-nom   { font-weight: 600; font-size: 12px; color: #212529; }
    .card-titre { font-size: 11px; color: #495057; margin-top: 1px; }
    .card-date  { font-size: 10px; color: #6c757d; margin-top: 2px; }

    /* ── Empty states ────────────────────────────────────────────────────── */
    .empty-col {
      text-align: center;
      color: #adb5bd;
      font-size: 11px;
      padding: 14px 8px;
    }

    /* ── Status bar ──────────────────────────────────────────────────────── */
    .statusbar {
      padding: 5px 12px;
      font-size: 11px;
      background: #fff;
      border-top: 1px solid #dee2e6;
      min-height: 26px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .statusbar.success { background: #d1e7dd; color: #0f5132; }
    .statusbar.error   { background: #f8d7da; color: #842029; }
    .statusbar.warn    { background: #fff3cd; color: #664d03; }
  </style>
</head>
<body>

<div class="toolbar">
  <h1>Planification — Examens écrits</h1>
  <input class="search-input" id="search" type="search"
    placeholder="Rechercher candidat, entreprise…" oninput="filterCards()" />
</div>

<div class="board" id="board"></div>
<div class="statusbar" id="statusbar">Chargement…</div>

<script>
  let exams      = [];
  let sessions   = [];
  let mappings   = {};
  let tableId    = null;
  let draggingId = null;

  // ── Grist ──────────────────────────────────────────────────────────────────

  grist.ready({
    requiredAccess: 'full',
    columns: [
      { name: 'ExamCandidatNom', title: 'Examen — Candidat (nom affiché)', type: 'Text'      },
      { name: 'ExamEntreprise',  title: 'Examen — Entreprise',             type: 'Text'      },
      { name: 'ExamTitre',       title: 'Examen — Libellé examen',         type: 'Text'      },
      { name: 'ExamSession',     title: 'Examen — Session (FK)',           type: 'Int,Ref'   },
      { name: 'ExamDate',        title: 'Examen — Date souhaitée',         type: 'Date,Text' },
    ],
  });

  grist.onOptions((_opts, interaction) => {
    mappings = interaction?.columns ?? {};
  });

  grist.onRecords(async records => {
    tableId = records[0]?._tableId ?? tableId;
    exams = records.map(parseExam);
    await loadSessions();
    render();
  });

  // ── Parsing ────────────────────────────────────────────────────────────────

  // Noms de colonnes réels dans Grist (fallback quand le mapping n'est pas configuré)
  const FALLBACK = {
    ExamCandidatNom: 'gristHelper_Display',     // valeur affichée de la Ref Candidat
    ExamEntreprise:  'Entreprise',
    ExamTitre:       'libelle_examen_ecrit',
    ExamSession:     'Sessions_examens_ecrits',  // FK entier vers Sessions_examens_ecrits
    ExamDate:        'date_heure',
  };

  function getField(r, name) {
    const mapped = mappings[name];
    if (mapped !== undefined && r[mapped] !== undefined) return r[mapped];
    return r[FALLBACK[name]];
  }

  function parseExam(r) {
    const sessionRaw = getField(r, 'ExamSession');
    const sessionId  = typeof sessionRaw === 'number' && sessionRaw > 0 ? sessionRaw : null;
    const dateRaw    = getField(r, 'ExamDate');
    let dateStr = '';
    if (typeof dateRaw === 'number' && dateRaw > 0) dateStr = fmtDate(dateRaw * 1000);
    else if (typeof dateRaw === 'string' && dateRaw) dateStr = dateRaw;
    return {
      id:         r.id,
      nom:        String(getField(r, 'ExamCandidatNom') ?? ''),
      entreprise: String(getField(r, 'ExamEntreprise')  ?? ''),
      titre:      String(getField(r, 'ExamTitre')       ?? ''),
      sessionId,
      date: dateStr,
    };
  }

  // ── Chargement des sessions ────────────────────────────────────────────────

  async function loadSessions() {
    try {
      const tbl = await grist.docApi.fetchTable('Sessions_examens_ecrits');
      const n = tbl.id.length;
      sessions = [];
      for (let i = 0; i < n; i++) {
        const id = tbl.id[i];
        if (!id || id < 0) continue;
        const rawPlaces = tbl.Places_disponibles?.[i];
        const places = typeof rawPlaces === 'number'
          ? rawPlaces
          : (rawPlaces != null && rawPlaces !== '' ? Number(rawPlaces) : null);
        sessions.push({
          id,
          num:    String(tbl.num?.[i] ?? '').trim(),
          date:   tbl.Date?.[i] ?? null,           // timestamp Unix (secondes)
          centre: String(tbl.gristHelper_Display?.[i] ?? ''),
          places: isNaN(places) ? null : places,
          passee: !!tbl.Session_passee?.[i],
        });
      }
      // Sessions actives en premier (triées par date), passées en dernier
      sessions.sort((a, b) => {
        if (a.passee !== b.passee) return a.passee ? 1 : -1;
        return (a.date ?? 0) - (b.date ?? 0);
      });
    } catch (e) {
      console.warn('loadSessions:', e.message);
    }
  }

  // ── Rendu ──────────────────────────────────────────────────────────────────

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    board.appendChild(buildColumn(null));
    sessions.forEach(sess => {
      const count = exams.filter(e => e.sessionId === sess.id).length;
      if (sess.passee && count === 0) return; // masque les sessions passées vides
      board.appendChild(buildColumn(sess));
    });
    filterCards();
    const active = sessions.filter(s => !s.passee).length;
    const nonAff = exams.filter(e => !e.sessionId).length;
    showStatus(`${exams.length} examen(s) · ${active} session(s) active(s) · ${nonAff} non affecté(s)`);
  }

  function buildColumn(sess) {
    const isUnaffected = sess === null;
    const sessExams    = isUnaffected
      ? exams.filter(e => !e.sessionId)
      : exams.filter(e => e.sessionId === sess.id);

    const col = document.createElement('div');
    col.className = 'column'
      + (isUnaffected ? ' col-unaffected' : '')
      + (sess?.passee  ? ' col-passee'    : '');
    col.dataset.sessionId = isUnaffected ? '' : String(sess.id);
    if (sess && sess.places === 0) col.classList.add('drop-blocked');

    // En-tête
    const header = document.createElement('div');
    header.className = 'column-header';
    if (isUnaffected) {
      header.innerHTML = `
        <div class="col-title-row">
          <span class="col-title">Non affectés</span>
          <span class="badge-places unknown">${sessExams.length}</span>
        </div>`;
    } else {
      const sessName = sess.num || (sess.date ? fmtDate(sess.date * 1000) : `#${sess.id}`);
      const dateStr  = sess.date ? fmtDate(sess.date * 1000) : '';
      header.innerHTML = `
        <div class="col-title-row">
          <span class="col-title">${esc(sessName)}</span>
          ${badgePlaces(sess.places)}
        </div>
        ${dateStr     ? `<div class="col-meta">${dateStr}</div>` : ''}
        ${sess.centre ? `<div class="col-lieu">${esc(sess.centre)}</div>` : ''}`;
    }
    col.appendChild(header);

    // Liste des cartes
    const list = document.createElement('div');
    list.className = 'card-list';
    if (!sessExams.length) {
      list.innerHTML = `<div class="empty-col">${isUnaffected ? 'Aucun examen non affecté' : 'Déposez un examen ici'}</div>`;
    } else {
      sessExams.forEach(exam => list.appendChild(makeCard(exam)));
    }
    col.appendChild(list);

    // Événements drag & drop
    list.addEventListener('dragover', e => {
      e.preventDefault();
      if (!col.classList.contains('drop-blocked')) list.classList.add('drag-over');
      e.dataTransfer.dropEffect = col.classList.contains('drop-blocked') ? 'none' : 'move';
    });
    list.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) list.classList.remove('drag-over');
    });
    list.addEventListener('drop', e => onDrop(e, col));

    return col;
  }

  function badgePlaces(places) {
    if (places === null || places === undefined) return '';
    const cls   = places === 0 ? 'full' : places === 1 ? 'warn' : 'free';
    return `<span class="badge-places ${cls}">${places} pl.</span>`;
  }

  function makeCard(exam) {
    const card = document.createElement('div');
    card.className = 'exam-card';
    card.draggable = true;
    card.dataset.examId = String(exam.id);

    let html = '';
    if (exam.entreprise) html += `<div class="card-entreprise">${esc(exam.entreprise)}</div>`;
    html += `<div class="card-nom">${esc(exam.nom) || `Examen #${exam.id}`}</div>`;
    if (exam.titre) html += `<div class="card-titre">${esc(exam.titre)}</div>`;
    if (exam.date)  html += `<div class="card-date">📅 ${esc(exam.date)}</div>`;
    card.innerHTML = html;

    card.addEventListener('dragstart', e => {
      draggingId = exam.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      draggingId = null;
      document.querySelectorAll('.card-list').forEach(l => l.classList.remove('drag-over'));
    });
    return card;
  }

  // ── Drag & Drop ────────────────────────────────────────────────────────────

  async function onDrop(e, col) {
    e.preventDefault();
    col.querySelector('.card-list')?.classList.remove('drag-over');
    if (draggingId === null) return;
    if (col.classList.contains('drop-blocked')) {
      showStatus('Session complète — aucune place disponible.', 'error', 4000);
      return;
    }

    const targetSessId = col.dataset.sessionId ? Number(col.dataset.sessionId) : null;
    const exam = exams.find(ex => ex.id === draggingId);
    if (!exam || exam.sessionId === targetSessId) return;

    if (targetSessId) {
      const sess = sessions.find(s => s.id === targetSessId);
      if (sess?.places === 1) showStatus('Attention — dernière place disponible.', 'warn', 4000);
    }

    // Mise à jour optimiste
    const prevSessionId = exam.sessionId;
    exam.sessionId = targetSessId;
    render();

    const sessionField = mappings['ExamSession'] ?? FALLBACK['ExamSession'];
    try {
      await grist.docApi.applyUserActions([[
        'UpdateRecord', tableId, exam.id,
        { [sessionField]: targetSessId ?? 0 },
      ]]);
      const sessName = targetSessId
        ? (sessions.find(s => s.id === targetSessId)?.num || `Session #${targetSessId}`)
        : 'Non affectés';
      showStatus(`Déplacé vers « ${esc(sessName)} ».`, 'success', 3000);
      // Re-fetch pour rafraîchir Places_disponibles
      await loadSessions();
      render();
    } catch (err) {
      exam.sessionId = prevSessionId; // annulation
      render();
      showStatus(`Erreur : ${err.message}`, 'error');
    }
  }

  // ── Recherche ──────────────────────────────────────────────────────────────

  function filterCards() {
    const q = (document.getElementById('search')?.value ?? '').toLowerCase().trim();
    document.querySelectorAll('.exam-card').forEach(card => {
      card.classList.toggle('hidden', q.length > 0 && !card.textContent.toLowerCase().includes(q));
    });
  }

  // ── Helpers ────────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Timestamp Unix (ms) → JJ/MM/AAAA en UTC
  function fmtDate(ms) {
    const d = new Date(ms);
    if (isNaN(d.getTime())) return '';
    const dd = String(d.getUTCDate()).padStart(2, '0');
    const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
    return `${dd}/${mm}/${d.getUTCFullYear()}`;
  }

  function showStatus(msg, type = '', duration = 0) {
    const bar = document.getElementById('statusbar');
    bar.textContent = msg;
    bar.className = `statusbar ${type}`;
    if (duration) setTimeout(() => { bar.textContent = ''; bar.className = 'statusbar'; }, duration);
  }
</script>
</body>
</html>
